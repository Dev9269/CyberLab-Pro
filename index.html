<!DOCTYPE html>

<head>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap');

:root {
  --primary: #00d4ff;
  --secondary: #7c3aed;
  --accent: #10b981;
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1a2e;
  --bg-card: rgba(26, 26, 46, 0.8);
  --text-primary: #ffffff;
  --text-secondary: #a1a1aa;
  --border: rgba(255, 255, 255, 0.1);
  --glow: rgba(0, 212, 255, 0.3);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f23 100%);
  color: var(--text-primary);
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.matrix-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: 
    radial-gradient(circle at 20% 80%, rgba(120, 58, 237, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-20px) rotate(1deg); }
  66% { transform: translateY(10px) rotate(-1deg); }
}

@keyframes glitch {
  0%, 100% { 
    transform: translate(0);
    filter: hue-rotate(0deg);
  }
  10% { 
    transform: translate(-1px, 1px);
    filter: hue-rotate(90deg);
  }
  20% { 
    transform: translate(1px, -1px);
    filter: hue-rotate(180deg);
  }
  30% { 
    transform: translate(-1px, -1px);
    filter: hue-rotate(270deg);
  }
  40% { 
    transform: translate(1px, 1px);
    filter: hue-rotate(360deg);
  }
}

.glitch {
  animation: glitch 3s ease-in-out infinite;
}

@keyframes typing {
  0% { width: 0; opacity: 0; }
  1% { opacity: 1; }
  100% { width: 100%; opacity: 1; }
}

@keyframes blink {
  0%, 50% { border-color: var(--primary); }
  51%, 100% { border-color: transparent; }
}

.typing {
  overflow: hidden;
  border-right: 2px solid var(--primary);
  white-space: nowrap;
  animation: typing 3s cubic-bezier(0.4, 0, 0.2, 1), blink 1s step-end infinite;
}

.neon {
  text-shadow: 
    0 0 5px var(--primary),
    0 0 10px var(--primary),
    0 0 20px var(--primary),
    0 0 40px var(--primary);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.neon-box {
  box-shadow: 
    0 0 20px var(--glow),
    inset 0 0 20px rgba(0, 212, 255, 0.1),
    0 4px 15px rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(0, 212, 255, 0.3);
  backdrop-filter: blur(10px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.neon-box:hover {
  box-shadow: 
    0 0 30px var(--glow),
    inset 0 0 30px rgba(0, 212, 255, 0.2),
    0 8px 25px rgba(0, 0, 0, 0.3);
  transform: translateY(-2px);
}

@keyframes pulse {
  0%, 100% { 
    transform: scale(1);
    box-shadow: 0 0 0 0 var(--glow);
  }
  50% { 
    transform: scale(1.02);
    box-shadow: 0 0 0 10px rgba(0, 212, 255, 0);
  }
}

.pulse {
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.pulse:hover {
  animation: pulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  transform: translateY(-1px);
}

.terminal {
  background: linear-gradient(145deg, var(--bg-card), rgba(15, 15, 35, 0.9));
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.terminal::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 16px;
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, #ff5f56 0%, #ff5f56 35%, transparent 35%);
  box-shadow: 
    20px 0 0 -2px #ffbd2e,
    40px 0 0 -2px #27ca3f;
  border-radius: 50%;
}

.terminal:hover {
  transform: translateY(-2px);
  box-shadow: 
    0 12px 40px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.cyber-btn {
  background: linear-gradient(135deg, var(--secondary), var(--primary));
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: var(--text-primary);
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 
    0 4px 15px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.cyber-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.cyber-btn:hover::before {
  left: 100%;
}

.cyber-btn:hover {
  transform: translateY(-2px);
  box-shadow: 
    0 8px 25px rgba(0, 0, 0, 0.3),
    0 0 20px var(--glow),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

@keyframes progress {
  0% { 
    width: 0%; 
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% { 
    width: 100%; 
    opacity: 1;
  }
}

.progress-bar {
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
  background-size: 200% 100%;
  border-radius: 3px;
  animation: 
    progress 2s cubic-bezier(0.4, 0, 0.2, 1),
    gradient 3s ease infinite;
  box-shadow: 0 0 10px var(--glow);
}

.cyber-card {
  background: linear-gradient(145deg, var(--bg-card), rgba(15, 15, 35, 0.8));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  backdrop-filter: blur(20px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 
    0 4px 20px rgba(0, 0, 0, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.cyber-card:hover {
  transform: translateY(-8px);
  box-shadow: 
    0 20px 40px rgba(0, 0, 0, 0.2),
    0 0 20px var(--glow),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.score-item {
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 8px;
}

.score-item:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(120, 58, 237, 0.1));
  transform: translateX(12px) scale(1.02);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.spinner {
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

.cyber-text {
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradient 6s ease infinite;
  font-weight: 700;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  25% { background-position: 100% 50%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes scaleIn {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.animate-in {
  animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.scale-in {
  animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.watermark {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0, 0, 0, 0.8);
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: 8px;
  padding: 12px;
  font-size: 11px;
  color: var(--text-secondary);
  backdrop-filter: blur(10px);
  z-index: 1000;
  transition: all 0.3s ease;
}

.watermark:hover {
  background: rgba(0, 0, 0, 0.9);
  border-color: var(--primary);
  color: var(--text-primary);
}

.watermark a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.3s ease;
}

.watermark a:hover {
  color: var(--accent);
  text-shadow: 0 0 5px var(--accent);
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.contact-info > div {
  transition: all 0.3s ease;
  padding: 2px 4px;
  border-radius: 4px;
}

.contact-info > div:hover {
  background: rgba(0, 212, 255, 0.1);
  transform: translateX(3px);
}

.contact-info > div:first-child:hover {
  text-shadow: 0 0 10px var(--primary);
}

.contact-info > div:nth-child(2):hover {
  color: var(--primary);
  text-shadow: 0 0 8px var(--primary);
}

@media (max-width: 768px) {
  .terminal {
    padding: 16px;
    margin: 8px;
  }
  
  .cyber-btn {
    padding: 10px 20px;
    font-size: 13px;
  }
  
  .cyber-card {
    padding: 16px;
    margin: 8px 0;
  }
  
  .watermark {
    bottom: 10px;
    right: 10px;
    padding: 8px;
    font-size: 10px;
  }
}
    </style>
</head>
